<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>
<style>
body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:Arial;
overflow:hidden;
}
h1{
color:#ff4d6d;
text-align:center;
font-size:3em;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>
<body>
<h1>
🎉 Төрсөн өдрийн мэнд хүргэе, хайрт минь ❤️<br><br>
Чамдаа маш их хайртай шүү 💖
</h1>
</body>
</html>
