<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Оддоо ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    position:relative;
    z-index:10;
    padding:20px;
}

.heart{
    font-size:130px;
    animation:beat 1.2s infinite;
    filter:drop-shadow(0 0 25px #ff3366);
}

h1{
    color:#ff5c8a;
    font-size:38px;
    margin-top:10px;
    text-shadow:0 0 15px #ff5c8a;
}

.message{
    margin-top:20px;
    color:white;
    font-size:22px;
    line-height:1.8;
    max-width:700px;
    text-shadow:0 0 10px pink;
}

.float{
    position:absolute;
    bottom:-50px;
    animation:up linear infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

@keyframes up{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>

    <h1>🎂 Төрсөн өдрийн мэнд хүргэе, миний Од ❤️</h1>

    <div class="message">
        Өнөөдөр аз жаргал, инээмсэглэлээр дүүрэн сайхан өдөр өнгөрүүлээрэй ✨
        <br><br>
        Чиний хүссэн бүхэн биелж,
        үргэлж аз жаргалтай байгаасай гэж хүсэж байна 💕
        <br><br>
        Хайртай шүү ❤️
    </div>

</div>

<script>
for(let i=0;i<70;i++){
    let h=document.createElement("div");

    h.className="float";
    h.innerHTML=["💕","💖","❤️","💘"][Math.floor(Math.random()*4)];

    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*30)+"px";
    h.style.animationDuration=(4+Math.random()*6)+"s";
    h.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(h);
}
</script>

</body>
</html>
