<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Happy Birthday ❤️</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
}

.message{
    position:absolute;
    top:30px;
    text-align:center;
    z-index:1000;
}

.message h1{
    color:#ff4d6d;
    font-size:50px;
}

.message h2{
    color:white;
    font-size:35px;
}

.heart{
    color:#ff4d6d;
    font-size:14px;
    line-height:14px;
    white-space:pre;
    text-align:center;
    animation:beat 1.5s infinite;
}

.floating{
    position:absolute;
    font-size:30px;
    animation:float 8s linear infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-120vh);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="message">
<h1>🎉 Төрсөн өдрийн мэнд хүргэе, хайрт минь ❤️</h1>
<h2>Чамдаа маш их хайртай шүү 💕</h2>
</div>

<div class="heart" id="heart"></div>

<script>

let heart = "";
for(let y=15;y>-15;y--){
    let line="";
    for(let x=-30;x<30;x++){
        let a=x*0.05;
        let b=y*0.1;

        if(Math.pow(a*a+b*b-1,3)-a*a*b*b*b<=0){
            line+="I LOVE YOU ";
        }else{
            line+=" ";
        }
    }
    heart += line + "\n";
}

document.getElementById("heart").innerText = heart;

for(let i=0;i<80;i++){
    let h=document.createElement("div");
    h.innerHTML="💕";
    h.className="floating";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(4+Math.random()*6)+"s";
    h.style.fontSize=(20+Math.random()*30)+"px";
    document.body.appendChild(h);
}
</script>

</body>
</html>
