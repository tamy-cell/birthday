<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.heart{
position:relative;
width:300px;
height:270px;
transform:rotate(-45deg);
background:#ff004f;
animation:beat 1s infinite;
box-shadow:0 0 50px #ff004f;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:300px;
height:270px;
background:#ff004f;
border-radius:50%;
}

.heart:before{
top:-150px;
left:0;
}

.heart:after{
left:150px;
top:0;
}

.text{
position:absolute;
z-index:100;
text-align:center;
font-size:28px;
font-weight:bold;
text-shadow:0 0 20px pink;
}

.love{
font-size:50px;
color:#fff;
margin-top:10px;
}

.floating{
position:absolute;
color:#ff4d6d;
font-size:25px;
animation:float 8s linear infinite;
}

@keyframes beat{
0%{transform:rotate(-45deg) scale(1);}
50%{transform:rotate(-45deg) scale(1.08);}
100%{transform:rotate(-45deg) scale(1);}
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="text">
🎉 Төрсөн өдрийн мэнд хүргэе<br>
Хайрт минь ❤️
<div class="love">I LOVE YOU 💕</div>
</div>

<div class="heart"></div>

<script>
for(let i=0;i<80;i++){
let h=document.createElement("div");
h.innerHTML="💕";
h.className="floating";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*6)+"s";
h.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(h);
}
</script>

</body>
</html>
