<body>

<div class="container">
    <div class="heart">❤️</div>

    <h1>🎂 Happy Birthday 🎂</h1>

    <div class="love">
        Төрсөн өдрийн мэнд хүргэе, хайрт минь ❤️<br><br>

        Өнөөдөр аз жаргал, инээмсэглэлээр дүүрэн сайхан өдөр
        өнгөрүүлээрэй ✨<br><br>

        Чиний хүссэн бүхэн биелж,
        үргэлж аз жаргалтай байгаасай гэж хүсэж байна 💕<br><br>

        Хайртай шүү ❤️
    </div>
</div>

<script>
for(let i=0;i<80;i++){
    let h=document.createElement("div");
    h.className="float";
    h.innerHTML=["💖","💕","❤️","💘"][Math.floor(Math.random()*4)];

    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*35)+"px";
    h.style.animationDuration=(4+Math.random()*6)+"s";
    h.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(h);
}
</script>

</body>
