<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Happy Birthday ❤️</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    z-index:10;
}

.heart{
    font-size:120px;
    animation:beat 1.2s infinite;
    filter:drop-shadow(0 0 20px red);
}

h1{
    color:#ff4d6d;
    font-size:38px;
    margin:15px;
}

p{
    color:white;
    font-size:24px;
    margin:10px;
}

.love{
    color:#ff80ab;
    font-size:28px;
    font-weight:bold;
}

.float{
    position:absolute;
    bottom:-50px;
    animation:up linear infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

@keyframes up{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="heart">❤️</div>

    <h1>🎉 Төрсөн өдрийн мэнд хүргэе,<br>хайрт минь ❤️</h1>

    <p>Өнөөдөр инээмсэглэлээр дүүрэн<br>сайхан өдөр өнгөрүүлээрэй ✨</p>

    <div class="love">
        Чамдаа маш их хайртай шүү 💕
    </div>
</div>

<script>
for(let i=0;i<50;i++){
    let h=document.createElement("div");
    h.className="float";
    h.innerHTML="💕";

    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*30)+"px";
    h.style.animationDuration=(4+Math.random()*6)+"s";
    h.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(h);
}
</script>

</body>
</html>
